<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Roots Store</title>
    <style>
        :root {
            --primary: #2e7d32;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #212121;
            --muted: #757575;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { color: var(--primary); margin-bottom: 5px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .item-name { font-size: 1.2rem; font-weight: bold; margin: 10px 0 5px 0; }
        .item-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .price { font-size: 1.1rem; color: var(--primary); font-weight: bold; }
        .category { background: #e8f5e9; color: var(--primary); padding: 3px 8px; border-radius: 15px; font-size: 0.8rem; }
        .btn {
            display: block;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-available { background: var(--primary); color: white; }
        .btn-sold { background: #e0e0e0; color: var(--muted); pointer-events: none; }
        .loading { text-align: center; font-size: 1.2rem; color: var(--muted); margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>Fresh Roots</h1>
        <p>Fresh backyard produce directly to you</p>
    </header>

    <div id="loading" class="loading">Loading fresh inventory...</div>
    <div class="grid" id="store-grid"></div>

    <script>
        // Your specific configurations
        const SHEET_ID = '1UMlVwoFQa3hLPMn_SGRyutK-v9aT-t6QCOnFYn3Gnr4';
        const VIBER_NUMBER = '9609473231'; 

        // URL to fetch Google Sheet data as a clean CSV format
        const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

        // Helper function to turn CSV text into a clean computer layout
        function parseCSV(text) {
            const lines = text.split('\n').map(line => line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            const headers = lines[0].map(h => h.replace(/^"|"$/g, '').trim().toLowerCase());
            
            return lines.slice(1).map(line => {
                let obj = {};
                line.forEach((cell, i) => {
                    if(headers[i]) {
                        obj[headers[i]] = cell.replace(/^"|"$/g, '').trim();
                    }
                });
                return obj;
            });
        }

        // Fetch the inventory live
        fetch(csvUrl)
            .then(response => response.text())
            .then(csvText => {
                const items = parseCSV(csvText);
                const grid = document.getElementById('store-grid');
                document.getElementById('loading').style.display = 'none';

                items.forEach(item => {
                    if (!item.name) return; // Skip empty rows

                    const card = document.createElement('div');
                    card.className = 'card';

                    const isAvailable = item.status.toLowerCase() === 'available';
                    
                    // Create direct Viber deep link structure
                    const viberText = encodeURIComponent(`Hi! I want to buy Item #${item.id}: ${item.name}`);
                    const viberLink = `viber://chat?number=%2B${VIBER_NUMBER}`;

                    card.innerHTML = `
                        <div>
                            <div class="item-name">${item.name}</div>
                            <div class="item-meta">
                                <span class="price">MVR ${parseFloat(item.price).toFixed(2)}</span>
                                <span class="category">${item.category}</span>
                            </div>
                        </div>
                        ${isAvailable 
                            ? `<a href="${viberLink}" class="btn btn-available">Order via Viber</a>`
                            : `<a href="#" class="btn btn-sold">SOLD OUT</a>`
                        }
                    `;
                    grid.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('loading').innerText = 'Error loading inventory. Please refresh.';
                console.error(error);
            });
    </script>
</body>
</html>
