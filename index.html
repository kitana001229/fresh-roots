<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Roots Store</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #f4f6f4; }
        h1 { color: #1b5e20; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; transition: transform 0.2s; direction: auto; unicodde-bidi: plaintext; }
        .card:hover { transform: translateY(-3px); }
        .card img { max-width: 100%; height: 180px; object-fit: cover; border-radius: 8px; }
        .price { font-size: 1.4rem; font-weight: bold; color: #2e7d32; margin: 10px 0; }
        .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .available { background: #e8f5e9; color: #2e7d32; }
        .sold-out { background: #ffebee; color: #c62828; }
        .sold-out-card { opacity: 0.5; filter: grayscale(1); }
        .footer { margin-top: 50px; padding: 30px 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 4px solid #2e7d32; direction: auto; unicode-bidi: plaintext; }
        .footer h3 { color: #1b5e20; margin-top: 0; }
        .footer p { margin: 8px 0; color: #555; }
                /* Zoom Overlay Styles */
        #image-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 9999;
            cursor: zoom-out;
        }
        #image-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        #image-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        #image-overlay.active img {
            transform: scale(1);
        }
        /* Make the product card images look clickable */
        .card img {
            cursor: zoom-in;
            transition: transform 0.2s;
        }
        .card img:hover {
            transform: scale(1.02);
        }
                /* Buy Button Style */
        .buy-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 12px;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: background 0.2s;
        }
        .buy-btn:hover {
            background-color: #1b5e20;
        }

        /* Order Modal Overlay */
        #order-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10000;
        }
        #order-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .order-modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            width: 90%;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            direction: auto;
            unicode-bidi: plaintext;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }
        .close-btn:hover { color: #333; }
        .order-modal hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }
            
    </style>

    <!-- Load the official Supabase Client SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
</head>
<body>

    <h1>🌱 Fresh Roots Store</h1>
    <div class="grid" id="shop-grid">Loading up fresh stock...</div>
    <!-- Add contact info -->
    <div class="footer">
        <h3>Contact us | އިތުރު މައުލޫމާތައް</h3>
        <p>📞Phone: +960 7645592</p>
        <p>💬Viber: +960 9473231</p>
        <p>📍Location: Finihiyaa, R.Maakurathu, Maldives</p>
    </div>
    <!-- The full-screen zoom container -->
    <div id="image-overlay" onclick="this.classList.remove('active')"><img id="overlay-img" src="" alt="Zoomed view"></div>
    <!-- The Order Pop-up Modal -->
<div id="order-overlay" onclick="closeOrderModal(event)">
    <div class="order-modal">
        <span class="close-btn" onclick="document.getElementById('order-overlay').classList.remove('active')">&times;</span>
        <h3><strong id="order-item-name">this item</strong>,<br>!ގަންނަން ބޭނުންނަމަ ގުޅާލާ ނުވަތަ ވައިބާ ކޮއްލާ</h3>
        <hr>
        <p>📞 <strong>Phone:</strong> +960 7645592</p>
        <p>💬 <strong>Viber:</strong> +960 9473231</p>
        <hr>
    </div>
</div>
    
    
    <script>
        // 1. Connect to your brand new Supabase Project (using 'db' as supabase)
        const MY_URL = "https://cgbhpkjozmuurwhhevmj.supabase.co";
        const MY_KEY = "sb_publishable_CElfmuAcNStSGAL0H4gw-Q_Vm7t8nB3";
        
        const db = window.supabase.createClient(MY_URL, MY_KEY);

        // 2. Fetch all products from your database initially
        async function getProducts() {
            const { data, error } = await db.from('products').select('*');
            if (error) console.error("Error loading products:", error);
            else renderGrid(data);
        }

        // 3. Draw the products onto the customer's screen
        function renderGrid(products) {
            const grid = document.getElementById('shop-grid');
            grid.innerHTML = ''; 

            products.forEach(item => {
                const isSoldOut = item.status?.toLowerCase() === 'sold out' || item.status?.toLowerCase() === 'sold-out';
                
                const card = document.createElement('div');
                card.className = isSoldOut ? 'card sold-out-card' : 'card';
                
                card.innerHTML = `
                    <img src="${item.image_url || 'https://via.placeholder.com/250'}" alt="${item.name}" onclick="zoomImage('${item.image_url}')">
                    <h3>${item.name}</h3>
                    <p class="price">MVR ${item.price}</p>
                    <p class="stock" style="font-size: 0.9em; color: #666; margin-top: 4px;">
                     Available: ${item.quantity ?? 0}
                    </p>
                    <button class="buy-btn" onclick="openOrderModal('${item.name}')">Buy Now / ގަންނަން</button>
                    <span class="status ${isSoldOut ? 'sold-out' : 'available'}">${item.status || 'Available'}</span>
                `;
                grid.appendChild(card); 
            });
        }

        // 4. THE MAGIC: Listen for live changes to the database table
        db
            .channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, (payload) => {
                console.log('Change detected in database! Refreshing UI...', payload);
                getProducts(); // Instantly pull the fresh updates
            })
            .subscribe();

        // Run the initial load
        getProducts();
        // Function to open the full-screen zoom
function zoomImage(url) {
    const overlay = document.getElementById('image-overlay');
    const overlayImg = document.getElementById('overlay-img');
    overlayImg.src = url;
    overlay.classList.add('active');
}
        // Function to open the order pop-up and inject the item name
function openOrderModal(itemName) {
    document.getElementById('order-item-name').innerText = itemName;
    document.getElementById('order-overlay').classList.add('active');
}

// Function to close modal if clicking the dark background outside the box
function closeOrderModal(event) {
    if (event.target.id === 'order-overlay') {
        document.getElementById('order-overlay').classList.remove('active');
    }
}
        
        
    </script>
</body>
</html>
